<div class="content">
  <div class="title">
    {{pageTitle}}
  </div>

  <div class="grid">
    <div class="row">
      <div class="cellFull">
        <select>
          <option value="undefined" selected>--Select a product--</option>
          @for(product of products(); track product.id) {
            <option [ngValue]="product">{{product.productName}}</option>
          }
        </select>
      </div>
      <div class="cellLeft"><label for='quantity'>Quantity:</label></div>
      <div class="cellRight"><input class="quantityInput" id='quantity' type='number' [(ngModel)]="quantity"></div>
    </div>
  </div>
</div>
